<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAVLE - Choose Language</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">
  <main class="landing-shell" aria-labelledby="landingTitle">
    <video
      class="landing-video"
      autoplay
      muted
      loop
      playsinline
      preload="metadata"
    >
      <source src="assets/videos/hero.mp4" type="video/mp4" />
    </video>

    <div class="landing-overlay"></div>

    <section class="landing-content">
      <p class="landing-eyebrow">Restaurant & Cafe</p>
      <h1 class="landing-logo" id="landingTitle">GAV<span>LE</span></h1>
      <p class="landing-tagline">Choose your preferred menu language</p>

      <div class="landing-language-list" aria-label="Choose language">
        <button class="landing-language-btn" type="button" data-lang="en">English 🇺🇸</button>
        <button class="landing-language-btn" type="button" data-lang="ar">العربية 🇮🇶</button>
        <button class="landing-language-btn" type="button" data-lang="ku">کوردی 🇹🇯</button>
      </div>
    </section>

    <!-- Landing Footer -->
    <footer class="landing-footer">
      <div class="landing-social-icons">
        <!-- Instagram -->
        <a href="#" class="landing-social-link" aria-label="Instagram" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="https://www.instagram.com/menulix.krd?igsh=MW1hZGlhZTd2dzdwZg=="/>
          </svg>
        </a>
        <!-- Facebook -->
        <a href="#" class="landing-social-link" aria-label="Facebook" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="https://www.facebook.com/share/1E498mefVS/?mibextid=wwXIfr"/>
          </svg>
        </a>
        <!-- Location -->
        <a href="#" class="landing-social-link" aria-label="Our Location" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
        </a>
      </div>
      <p class="landing-brand-name">menulix</p>
    </footer>
  </main>

  <script>
    const supportedLanguages = ['en', 'ar', 'ku'];
    const rtlLanguages = ['ar', 'ku'];
    const storageKey = 'selectedLanguage';

    function selectLandingLanguage(language) {
      if (!supportedLanguages.includes(language)) {
        return;
      }

      localStorage.setItem(storageKey, language);
      document.documentElement.lang = language;
      document.documentElement.dir = rtlLanguages.includes(language) ? 'rtl' : 'ltr';
      document.body.dir = document.documentElement.dir;
      document.body.classList.add('landing-exiting');

      window.setTimeout(() => {
        window.location.href = 'menu.html';
      }, 260);
    }

    document.querySelectorAll('.landing-language-btn').forEach(button => {
      button.addEventListener('click', () => selectLandingLanguage(button.dataset.lang));
    });
  </script>
</body>
</html>
