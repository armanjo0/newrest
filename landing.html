<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAVLE - Choose Language</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">
  <main class="landing-shell" aria-labelledby="landingTitle">
    <video
      class="landing-video"
      autoplay
      muted
      loop
      playsinline
      preload="metadata"
    >
      <source src="assets/videos/hero.mp4" type="video/mp4" />
    </video>

    <div class="landing-overlay"></div>

    <section class="landing-content">
      <p class="landing-eyebrow">Restaurant & Cafe</p>
      <h1 class="landing-logo" id="landingTitle">GAV<span>LE</span></h1>
      <p class="landing-tagline">Choose your preferred menu language</p>

      <div class="landing-language-list" aria-label="Choose language">
        <button class="landing-language-btn" type="button" data-lang="en">English 🇺🇸</button>
        <button class="landing-language-btn" type="button" data-lang="ar">العربية 🇮🇶</button>
        <button class="landing-language-btn" type="button" data-lang="ku">کوردی 🇹🇯</button>
      </div>
    </section>

    <!-- Landing Footer -->
    <footer class="landing-footer">
      <div class="landing-social-icons">
        <!-- Instagram -->
        <a href="https://www.instagram.com/menulix.krd?igsh=MW1hZGlhZTd2dzdwZg==" class="landing-social-link" aria-label="Instagram" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </a>
        <!-- Facebook -->
        <a href="https://www.facebook.com/share/1E498mefVS/?mibextid=wwXIfr" class="landing-social-link" aria-label="Facebook" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </a>
        <!-- Location -->
        <a href="#" class="landing-social-link" aria-label="Our Location" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
        </a>
      </div>
      <p class="landing-brand-name">menulix</p>
    </footer>
  </main>

  <script>
    const supportedLanguages = ['en', 'ar', 'ku'];
    const rtlLanguages = ['ar', 'ku'];
    const storageKey = 'selectedLanguage';

    function selectLandingLanguage(language) {
      if (!supportedLanguages.includes(language)) {
        return;
      }

      localStorage.setItem(storageKey, language);
      document.documentElement.lang = language;
      document.documentElement.dir = rtlLanguages.includes(language) ? 'rtl' : 'ltr';
      document.body.dir = document.documentElement.dir;
      document.body.classList.add('landing-exiting');

      window.setTimeout(() => {
        window.location.href = 'menu.html';
      }, 260);
    }

    document.querySelectorAll('.landing-language-btn').forEach(button => {
      button.addEventListener('click', () => selectLandingLanguage(button.dataset.lang));
    });
  </script>
</body>
</html>
